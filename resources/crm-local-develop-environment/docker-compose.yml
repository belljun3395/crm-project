services:
    crm-postgres:
        container_name: crm-postgres16
        image: postgres:16-alpine
        environment:
            - POSTGRES_DB=crm
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - TZ=Asia/Seoul
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres -d crm" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 10s

    crm-adminer: # database web admin
        container_name: crm-adminer
        image: adminer:4
        ports:
            - "18080:8080"
        environment:
            - ADMINER_DEFAULT_SERVER=crm-postgres16
            - ADMINER_DESIGN=nette
            - ADMINER_PLUGINS=tables-filter tinymce

    crm-redis-cluster:
        image: redis:7.2-alpine
        container_name: crm-redis-cluster
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7001" ]
        ports:
            - "18081:5540"
            - "7001:7001"
            - "7002:7002"
            - "7003:7003"
            - "7004:7004"
            - "7005:7005"
            - "7006:7006"

    crm-redis-node-1:
        image: redis:7.2-alpine
        container_name: crm-redis-node-1
        network_mode: "service:crm-redis-cluster"
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7002" ]

    crm-redis-node-2:
        image: redis:7.2-alpine
        container_name: crm-redis-node-2
        network_mode: "service:crm-redis-cluster"
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7003" ]

    crm-redis-node-3:
        image: redis:7.2-alpine
        container_name: crm-redis-node-3
        network_mode: "service:crm-redis-cluster"
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7004" ]

    crm-redis-node-4:
        image: redis:7.2-alpine
        container_name: crm-redis-node-4
        network_mode: "service:crm-redis-cluster"
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7005" ]

    crm-redis-node-5:
        image: redis:7.2-alpine
        container_name: crm-redis-node-5
        network_mode: "service:crm-redis-cluster"
        volumes:
            - ./cluster/redis.sh:/tmp/redis.sh
        command: [ "sh","-c","chmod +x /tmp/redis.sh && /tmp/redis.sh password 7006" ]

    crm-redis-cluster-create:
        container_name: crm-redis-cluster-create
        image: redis:7.2-alpine
        network_mode: "service:crm-redis-cluster"
        depends_on:
            - crm-redis-cluster
            - crm-redis-node-1
            - crm-redis-node-2
            - crm-redis-node-3
            - crm-redis-node-4
            - crm-redis-node-5
        entrypoint: >
            sh -c "sleep 5 &&
            echo yes | redis-cli -a password --cluster create
            127.0.0.1:7001 127.0.0.1:7002 127.0.0.1:7003
            127.0.0.1:7004 127.0.0.1:7005 127.0.0.1:7006
            --cluster-replicas 1"

    crm-redis-insight:
        image: redislabs/redisinsight:latest
        container_name: crm-redis-insight
        network_mode: "service:crm-redis-cluster"

    crm-kafka:
        container_name: crm-kafka
        image: apache/kafka:3.8.1
        ports:
            - "9092:9092"
            - "9093:9093"
        environment:
            - KAFKA_NODE_ID=0
            - KAFKA_PROCESS_ROLES=controller,broker
            - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - KAFKA_CONTROLLER_QUORUM_VOTERS=0@crm-kafka:9093
            - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
            - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
            - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
            - KAFKA_NUM_PARTITIONS=3
            - KAFKA_DEFAULT_REPLICATION_FACTOR=1
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
            - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
            - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
            - CLUSTER_ID=HYL2Y2eXBWf3X-MUk4zjSA
        healthcheck:
            test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    crm-kafka-ui:
        container_name: crm-kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
            - "18082:8080"
        environment:
            - KAFKA_CLUSTERS_0_NAME=crm-kafka
            - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=crm-kafka:9092
        depends_on:
            crm-kafka:
                condition: service_healthy
