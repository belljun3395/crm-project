name: Update Backend Locks

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-locks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Refresh dependency locks
        working-directory: backend
        run: ./gradlew --write-locks dependencies

      - name: Detect lock changes
        id: changes
        run: |
          if git status --short -- backend | grep -qE '\.lockfile$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create PR for lock updates
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: chore/backend-locks-${{ github.run_id }}
        run: |
          git switch -c "$BRANCH_NAME"
          find backend -name '*.lockfile' -print0 | xargs -0 git add
          git commit -m "chore(backend): update dependency locks"
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH_NAME" \
            --title "chore(backend): update dependency locks" \
            --body "Automated backend dependency lock refresh."

      - name: No lock changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No backend dependency lock changes detected."
