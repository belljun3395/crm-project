name: Validation

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [ "main", "dev" ]
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend_static: ${{ steps.detect.outputs.backend_static }}
      backend_runtime: ${{ steps.detect.outputs.backend_runtime }}
      frontend: ${{ steps.detect.outputs.frontend }}
      ci: ${{ steps.detect.outputs.ci }}
    steps:
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          SAME_REPO_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          backend_static=false
          backend_runtime=false
          frontend=false
          ci=false
          changed_files=()
          zero_sha='0000000000000000000000000000000000000000'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            backend_static=true
            backend_runtime=true
            frontend=true
            ci=true
          elif [[ "$EVENT_NAME" == "pull_request" && "$SAME_REPO_PR" == "true" ]]; then
            echo "Using push-based validation for same-repository PR updates."
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            mapfile -t changed_files < <(
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
                --paginate \
                --jq '.[].filename'
            )
          else
            if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "$zero_sha" ]]; then
              base_ref="$BEFORE_SHA"
            else
              git fetch origin "$DEFAULT_BRANCH" --depth=1
              base_ref="$(git merge-base "origin/${DEFAULT_BRANCH}" "$GITHUB_SHA")"
            fi

            mapfile -t changed_files < <(git diff --name-only "$base_ref" "$GITHUB_SHA")
          fi

          for file in "${changed_files[@]}"; do
            [[ -z "$file" ]] && continue

            case "$file" in
              backend/*)
                backend_static=true
                backend_runtime=true
                ;;
              docs/openapi.json|scripts/refresh-openapi-docs.sh|resources/crm-local-develop-environment/*)
                backend_runtime=true
                ;;
              frontend/*)
                frontend=true
                ;;
              .github/workflows/*)
                ci=true
                ;;
            esac
          done

          if [[ "$ci" == "true" ]]; then
            backend_static=true
            backend_runtime=true
            frontend=true
          fi

          {
            echo "backend_static=$backend_static"
            echo "backend_runtime=$backend_runtime"
            echo "frontend=$frontend"
            echo "ci=$ci"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Validation change detection"
            echo
            if [[ ${#changed_files[@]} -eq 0 ]]; then
              echo "- No diff-scoped files matched for this event."
            else
              echo "- Changed files:"
              for file in "${changed_files[@]}"; do
                echo "  - $file"
              done
            fi
            echo
            echo "- backend_static: $backend_static"
            echo "- backend_runtime: $backend_runtime"
            echo "- frontend: $frontend"
            echo "- ci: $ci"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-build-and-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_static == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble and Ktlint Check
        run: ./gradlew --build-cache assemble ktlintCheck

  backend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_runtime == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          chmod +x ../scripts/refresh-openapi-docs.sh

      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: "./resources/crm-local-develop-environment/docker-compose.yml"
          services: |
            crm-postgres
            crm-redis-cluster-create
            crm-kafka

      - name: OpenAPI Drift Check
        working-directory: ${{ github.workspace }}
        run: VERIFY_ONLY=1 bash scripts/refresh-openapi-docs.sh

      - name: Run Tests with Coverage
        run: ./gradlew --build-cache test jacocoTestReport

      - name: Publish Test Report
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: 'Backend Coverage Report'
          update-comment: true

      - name: Upload Backend Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/build/reports/tests/test/
            backend/build/test-results/test/
          retention-days: 7

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/build/reports/jacoco/test/html/
          retention-days: 7

  backend-openapi-drift:
    runs-on: ubuntu-latest
    needs: [changes, backend-test]
    if: always() && (needs.changes.outputs.backend_runtime == 'true' || needs.changes.outputs.ci == 'true')
    steps:
      - name: Confirm OpenAPI Drift Check ran in backend-test
        shell: bash
        run: |
          if [[ "${{ needs.backend-test.result }}" != "success" ]]; then
            echo "OpenAPI drift is validated during backend-test, which did not succeed."
            exit 1
          fi

          echo "OpenAPI drift is validated during backend-test to avoid starting Docker twice."

  frontend-validation:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Run Tests (CI)
        working-directory: frontend
        run: npm run test:ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov-report/
          retention-days: 7
