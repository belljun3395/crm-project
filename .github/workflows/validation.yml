name: Validation

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docs/openapi.json'
              - 'scripts/**'
              - 'resources/**'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'

  backend-openapi-drift:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission
        run: |
          chmod +x backend/gradlew
          chmod +x scripts/refresh-openapi-docs.sh

      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: "./resources/crm-local-develop-environment/docker-compose.yml"
          services: |
            crm-mysql
            crm-redis-cluster-create
            crm-localstack
            crm-kafka

      - name: OpenAPI Drift Check
        run: VERIFY_ONLY=1 bash scripts/refresh-openapi-docs.sh

  backend-build-and-lint:
    runs-on: ubuntu-latest
    needs: [changes, backend-openapi-drift]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble
        run: ./gradlew --build-cache assemble

      - name: Ktlint Check
        run: ./gradlew --build-cache ktlintCheck --no-rebuild

  backend-test:
    runs-on: ubuntu-latest
    needs: [changes, backend-build-and-lint]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: "./resources/crm-local-develop-environment/docker-compose.yml"
          services: |
            crm-mysql
            crm-redis-cluster-create
            crm-localstack
            crm-kafka

      - name: Run Tests with Coverage
        run: ./gradlew --build-cache test jacocoTestReport

      - name: Publish Test Report
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: 'Backend Coverage Report'
          update-comment: true

      - name: Upload Backend Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/build/reports/tests/test/
            backend/build/test-results/test/
          retention-days: 7

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/build/reports/jacoco/test/html/
          retention-days: 7

  frontend-validation:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Tests (CI)
        working-directory: frontend
        run: npm run test:ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov-report/
          retention-days: 7
