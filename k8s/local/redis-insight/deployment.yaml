apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-redis-insight
  namespace: crm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-redis-insight
  template:
    metadata:
      labels:
        app: crm-redis-insight
    spec:
      containers:
        - name: redis-insight
          image: redislabs/redisinsight:latest
          ports:
            - containerPort: 5540
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 100m
