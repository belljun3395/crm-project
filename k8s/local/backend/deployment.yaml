apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-backend
  namespace: crm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-backend
  template:
    metadata:
      labels:
        app: crm-backend
    spec:
      initContainers:
        # Database 기동 대기
        - name: wait-for-database
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z crm-database 3306; do
                echo "Waiting for database..."; sleep 3
              done
              echo "Database is ready"
        # Kafka 기동 대기
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z crm-kafka 9092; do
                echo "Waiting for Kafka..."; sleep 3
              done
              echo "Kafka is ready"
      containers:
        - name: backend
          image: crm-backend
          imagePullPolicy: Never  # minikube 로컬 이미지 사용
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: crm-backend-config
            - secretRef:
                name: crm-backend-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: TZ
              value: "Asia/Seoul"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
