apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
  namespace: crm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-frontend
  template:
    metadata:
      labels:
        app: crm-frontend
    spec:
      containers:
        - name: frontend
          image: crm-frontend
          imagePullPolicy: Never  # minikube 로컬 이미지 사용
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: nginx-config
          configMap:
            name: crm-frontend-nginx
