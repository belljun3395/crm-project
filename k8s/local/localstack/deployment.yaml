apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-localstack
  namespace: crm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-localstack
  template:
    metadata:
      labels:
        app: crm-localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.8
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "ses,sqs,sns,events,scheduler,iam"
            - name: DEBUG
              value: "1"
            - name: START_WEB
              value: "1"
            - name: LEGACY_DIRECTORIES
              value: "1"
            - name: AWS_DEFAULT_REGION
              value: "ap-northeast-2"
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
          volumeMounts:
            - name: init-scripts
              mountPath: /etc/localstack/init/ready.d
          readinessProbe:
            httpGet:
              path: /health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: init-scripts
          configMap:
            name: crm-localstack-init
            defaultMode: 0755
