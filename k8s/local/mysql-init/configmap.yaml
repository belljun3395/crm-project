apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-mysql-initdb
  namespace: crm-local
data:
  00_init.sql: |
    CREATE DATABASE IF NOT EXISTS crm DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS test DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE USER IF NOT EXISTS 'crm-local'@'localhost' IDENTIFIED BY 'crm-local';
    CREATE USER IF NOT EXISTS 'crm-local'@'%' IDENTIFIED BY 'crm-local';

    GRANT ALL PRIVILEGES ON crm.* TO 'crm-local'@'localhost';
    GRANT ALL PRIVILEGES ON crm.* TO 'crm-local'@'%';
    GRANT ALL PRIVILEGES ON test.* TO 'crm-local'@'localhost';
    GRANT ALL PRIVILEGES ON test.* TO 'crm-local'@'%';

    FLUSH PRIVILEGES;
