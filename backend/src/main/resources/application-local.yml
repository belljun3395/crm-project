spring:
    main:
        web-application-type: reactive
    application:
        name: crm
    r2dbc:
        url: r2dbc:pool:postgresql://localhost:5432/crm
        username: postgres
        password: postgres
        routing:
            master-url: r2dbc:pool:postgresql://localhost:5432/crm
            replica-url: r2dbc:pool:postgresql://localhost:5432/crm
            username: postgres
            password: postgres
    data:
        redis:
            cluster:
                connect-ip: localhost
                max-redirects: 3
                password: password
                nodes:
                    - localhost:7001
                    - localhost:7002
                    - localhost:7003
                    - localhost:7004
                    - localhost:7005
                    - localhost:7006
    mail:
        protocol: smtp
        host: smtp.gmail.com
        port: 587
        username: example@example.com
        password: password
        properties:
            mail:
                smtp:
                    auth: true
                    debug: true
                    starttls:
                        enable: true
                    EnableSSL:
                        enable: true
    aws:
        region: ap-northeast-2
        endpoint-url: http://localhost:4566  # LocalStack endpoint for local development
        credentials:
            access-key: test  # LocalStack test credentials
            secret-key: test
        mail:
            configuration-set:
                default: local-configuration-set
        schedule:
            role-arn: arn:aws:iam::000000000000:role/LocalEventBridgeSchedulerRole
            sqs-arn: arn:aws:sqs:ap-northeast-2:000000000000:ses_sqs
            group-name: local-schedule-group
        sns:
            cache-invalidation-topic-arn: arn:aws:sns:ap-northeast-2:000000000000:cache-invalidation-topic
    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: crm-scheduled-tasks-consumer
            journey-group-id: crm-journey-trigger-consumer
    flyway:
        locations: classpath:db/migration/entity
        sql-migration-suffixes: sql
        baseline-on-migrate: true
        baseline-version: 0
    cloud:
        gcp:
            project-id: local-project
            pubsub:
                emulator-host: localhost:8085

gcp:
    pubsub:
        cache-invalidation-topic: cache-invalidation-topic
        cache-invalidation-subscription: cache-invalidation-subscription

springdoc:
    swagger-ui:
        operations-sorter: alpha
    model-and-view-allowed: true
    packages-to-scan: com.manage.crm

logging:
    config: classpath:logback-spring.xml
    level:
        root: INFO
        com.manage.crm: INFO
        org.springframework.r2dbc.core: WARN
        org.springframework.data.redis: WARN
        org.springframework.kafka: WARN
        org.apache.kafka: WARN
        reactor.kafka: WARN
        io.lettuce.core: WARN

management:
    endpoints:
        web:
            exposure:
                include: prometheus

scheduler:
    provider: redis-kafka

mail:
    provider: mock

webhook:
    ssl:
        verify: false

resilience4j:
    circuitbreaker:
        instances:
            webhookDelivery:
                failure-rate-threshold: 100
                wait-duration-in-open-state: 5s
