# application.yml has only common properties
server:
    compression:
        url:
            enabled: true
            patterns:
                - "/api/**"
            min-response-size: 1024
            mime-types:
                - "application/json"
                - "application/*+json"
    decompression:
        request:
            enabled: true

spring:
    profiles:
        group:
            local:
                - local
            k8s:
                - k8s
            prd:
                - prd
            dev:
                - dev
    cloud:
        gcp:
            pubsub:
                enabled: false

mail:
    # Mail send provider.
    # Supported values:
    # - 'smtp': Uses SMTP via JavaMail (Default, cloud-neutral, requires spring.mail.* settings)
    # - 'ses': Uses AWS Simple Email Service (requires spring.aws.* settings)
    provider: ${MAIL_PROVIDER:smtp}


scheduler:
    # Scheduler implementation provider.
    # Supported values:
    # - 'redis-kafka': Uses Redis Sorted Sets for scheduling and Kafka for distributed execution (Default)
    # - 'aws': Uses AWS EventBridge Scheduler (requires spring.aws.* settings)
    provider: ${SCHEDULER_PROVIDER:redis-kafka}

email:
    tracking:
        # Email tracking event receiver provider.
        # Supported values:
        # - 'kafka': Receives tracking events from Kafka topic 'email-tracking-events' (Default)
        # - 'webhook': Receives tracking events via HTTP POST /api/v1/email/tracking/webhook
        provider: ${EMAIL_TRACKING_PROVIDER:kafka}
        kafka:
            topic: ${EMAIL_TRACKING_KAFKA_TOPIC:email-tracking-events}
            group-id: ${EMAIL_TRACKING_KAFKA_GROUP_ID:crm-email-tracking-consumer}
        webhook:
            signing-secret: ${EMAIL_TRACKING_WEBHOOK_SIGNING_SECRET:}

webhook:
    # Enable/disable webhook feature globally (dispatching events to registered URLs)
    enabled: ${WEBHOOK_ENABLED:true}
    delivery:
        # Retry configuration for webhook delivery attempts
        max-attempts: ${WEBHOOK_DELIVERY_MAX_ATTEMPTS:3}
        initial-backoff-millis: ${WEBHOOK_DELIVERY_INITIAL_BACKOFF_MILLIS:200}
    signing:
        # Optional request signing (HMAC SHA-256)
        enabled: ${WEBHOOK_SIGNING_ENABLED:false}
        secret: ${WEBHOOK_SIGNING_SECRET:}
    resilience:
        circuit-breaker:
            instance-name: ${WEBHOOK_CIRCUIT_BREAKER_INSTANCE:webhookDelivery}
        rate-limiter:
            instance-name: ${WEBHOOK_RATE_LIMITER_INSTANCE:webhookDelivery}

resilience4j:
    circuitbreaker:
        instances:
            webhookDelivery:
                sliding-window-type: COUNT_BASED
                sliding-window-size: 20
                minimum-number-of-calls: 10
                failure-rate-threshold: 50
                wait-duration-in-open-state: 30s
                permitted-number-of-calls-in-half-open-state: 5
                automatic-transition-from-open-to-half-open-enabled: true
    ratelimiter:
        instances:
            webhookDelivery:
                limit-for-period: 50
                limit-refresh-period: 1s
                timeout-duration: 0
                register-health-indicator: true

idempotency:
    enabled: ${IDEMPOTENCY_ENABLED:true}
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}

